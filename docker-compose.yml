services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: slotbook
      POSTGRES_PASSWORD: slotbook
      POSTGRES_DB: slotbook
    ports:
      - "5432:5432"
    volumes:
      - slotbook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://slotbook:slotbook@db:5432/slotbook"
      AUTH_SECRET: "dev-secret-change-me-to-a-long-random-string"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run db:push && npm run start"

volumes:
  slotbook_pgdata:

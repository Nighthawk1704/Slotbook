services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: slotbook
      POSTGRES_PASSWORD: slotbook
      POSTGRES_DB: slotbook
    ports:
      - "5432:5432"
    volumes:
      - slotbook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotbook"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  slotbook_pgdata:
